name: Build Camera Lock-On All Loaders

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  neoforge-1-21-1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neoforge-1.21.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew build --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: camera-lock-on-neoforge-1.21.1
          path: mods/*.jar

  fabric-1-21-1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fabric-1.21.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew build --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: camera-lock-on-fabric-1.21.1
          path: fabric-1.21.1/build/libs/*.jar

  forge-1-20-1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge-1.20.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew build --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: camera-lock-on-forge-1.20.1
          path: forge-1.20.1/build/libs/*.jar
